AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BimaSathi — WhatsApp-first AI Crop Insurance Claim Assistant

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: !Ref NodeEnvironment
        AWS_REGION_NAME: !Ref AWS::Region
        USERS_TABLE: !Ref UsersTable
        CLAIMS_TABLE: !Ref ClaimsTable
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        DEADLINES_TABLE: !Ref DeadlinesTable
        AUDIT_LOG_TABLE: !Ref AuditLogTable
        CONSENT_TABLE: !Ref ConsentTable
        EVIDENCE_BUCKET: !Ref EvidenceBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref BedrockRegion
        POLLY_REGION: !Ref PollyRegion
        TRANSCRIBE_REGION: !Ref TranscribeRegion
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_CLIENT_ID: !Ref UserPoolClient

Parameters:
  # ── Meta WhatsApp Cloud API Credentials ──
  MetaAccessToken:
    Type: String
    Description: Meta App System User Access Token
    NoEcho: true
  MetaPhoneNumberId:
    Type: String
    Description: Meta Phone Number ID (e.g., 1059801033876959)
    NoEcho: true
  MetaVerifyToken:
    Type: String
    Description: Secret token for webhook verification
    NoEcho: true
  MetaAppSecret:
    Type: String
    Description: Meta App Secret for webhook signature validation
    Default: ''
    NoEcho: true

  # ── Twilio Dashboard Auth Credentials ──
  TwilioAccountSid:
    Type: String
    Description: Twilio Account SID for Dashboard SMS
    NoEcho: true
  TwilioAuthToken:
    Type: String
    Description: Twilio Auth Token for Dashboard SMS
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    Description: Twilio Phone Number for Dashboard SMS
    NoEcho: true
  BedrockRegion:
    Type: String
    Description: AWS region used for Bedrock inference
    Default: us-east-1
  BedrockModelId:
    Type: String
    Description: Bedrock model or inference profile ID
    Default: us.amazon.nova-pro-v1:0
  PollyRegion:
    Type: String
    Description: AWS region used for Polly
    Default: ap-south-1
  TranscribeRegion:
    Type: String
    Description: AWS region used for Transcribe
    Default: ap-south-1
  NodeEnvironment:
    Type: String
    Description: Runtime environment for Lambda functions
    Default: production

Resources:
  # ═══════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

  # ═══════════════════════════════════════
  # LAMBDA FUNCTIONS
  # ═══════════════════════════════════════
  WhatsAppWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-whatsapp-webhook
      Handler: src/lambdas/whatsapp-webhook/index.handler
      Events:
        WebhookPost:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /webhook/whatsapp
            Method: post
        WebhookGet:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /webhook/whatsapp
            Method: get
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
          META_APP_SECRET: !Ref MetaAppSecret
          CONVERSATION_ENGINE_FUNCTION: !Ref ConversationEngineFunction
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DeadlinesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConsentTable }
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'
            - Effect: Allow
              Action: ['rekognition:DetectLabels', 'rekognition:DetectModerationLabels']
              Resource: '*'
            - Effect: Allow
              Action: ['transcribe:StartTranscriptionJob', 'transcribe:GetTranscriptionJob']
              Resource: '*'
            - Effect: Allow
              Action: ['polly:SynthesizeSpeech']
              Resource: '*'
            - Effect: Allow
              Action: ['lambda:InvokeFunction']
              Resource: '*'

  ConversationEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-conversation-engine
      Handler: src/lambdas/conversation-engine/index.handler
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
          VOICE_PROCESSOR_FUNCTION: !Ref VoiceProcessorFunction
          PHOTO_PROCESSOR_FUNCTION: !Ref PhotoProcessorFunction
          CLAIM_GENERATOR_FUNCTION: !Ref ClaimGeneratorFunction
          APPEAL_GENERATOR_FUNCTION: !Ref AppealGeneratorFunction
          DOCUMENT_INTAKE_FUNCTION: !Ref DocumentIntakeFunction
          FORM_SCHEMA_EXTRACTOR_FUNCTION: !Ref FormSchemaExtractorFunction
          AUTO_FILL_FUNCTION: !Ref AutoFillFunction
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DeadlinesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConsentTable }
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'
            - Effect: Allow
              Action: ['lambda:InvokeFunction']
              Resource: '*'

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-auth
      Handler: src/lambdas/auth/index.handler
      Events:
        SendOtp:
          Type: Api
          Properties: { RestApiId: !Ref ApiGateway, Path: /auth, Method: post }
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConsentTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['cognito-idp:AdminCreateUser', 'cognito-idp:AdminInitiateAuth', 'cognito-idp:AdminSetUserPassword']
              Resource: !GetAtt UserPool.Arn

  VoiceProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-voice-processor
      Handler: src/lambdas/voice-processor/index.handler
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
      Policies:
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - Statement:
            - Effect: Allow
              Action: ['transcribe:StartTranscriptionJob', 'transcribe:GetTranscriptionJob']
              Resource: '*'

  PhotoProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-photo-processor
      Handler: src/lambdas/photo-processor/index.handler
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
      Policies:
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['rekognition:DetectLabels', 'rekognition:DetectModerationLabels']
              Resource: '*'
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  ClaimGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-claim-generator
      Handler: src/lambdas/claim-generator/index.handler
      MemorySize: 1024
      Timeout: 60
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
      Policies:
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  DeadlineTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-deadline-trigger
      Handler: src/lambdas/deadline-trigger/index.handler
      Events:
        ScheduleRule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
          APPEAL_GENERATOR_FUNCTION: !Ref AppealGeneratorFunction
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DeadlinesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['lambda:InvokeFunction']
              Resource: '*'

  StatusPollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-status-poller
      Handler: src/lambdas/status-poller/index.handler
      Events:
        DailyPoll:
          Type: Schedule
          Properties:
            Schedule: rate(24 hours)
            Enabled: true
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
          META_VERIFY_TOKEN: !Ref MetaVerifyToken
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DeadlinesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }

  AppealGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-appeal-generator
      Handler: src/lambdas/appeal-generator/index.handler
      Policies:
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  # ═══════════════════════════════════════
  # DOCUMENT BUILDER AGENT FUNCTIONS
  # ═══════════════════════════════════════
  DocumentIntakeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-document-intake
      Handler: src/lambdas/document-intake/index.handler
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          META_ACCESS_TOKEN: !Ref MetaAccessToken
          META_PHONE_NUMBER_ID: !Ref MetaPhoneNumberId
      Policies:
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['textract:DetectDocumentText', 'textract:AnalyzeDocument']
              Resource: '*'
            - Effect: Allow
              Action: ['rekognition:DetectModerationLabels']
              Resource: '*'
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  FormSchemaExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-form-schema-extractor
      Handler: src/lambdas/form-schema-extractor/index.handler
      Timeout: 60
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  AutoFillFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-auto-fill
      Handler: src/lambdas/auto-fill/index.handler
      Timeout: 60
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - Statement:
            - Effect: Allow
              Action: ['bedrock:InvokeModel', 'bedrock:Converse']
              Resource: '*'

  OperatorApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bimasathi-operator-api
      Handler: src/lambdas/operator-api/index.handler
      Events:
        ListClaims:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /claims
            Method: get
        GetClaim:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: "/claims/{id}"
            Method: get
        SubmitClaim:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: "/claims/{id}/submit"
            Method: post
        Analytics:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /analytics
            Method: get
        CreateFarmer:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /farmers
            Method: post
        ListFarmers:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /farmers
            Method: get
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ClaimsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AuditLogTable }
        - S3CrudPolicy: { BucketName: !Ref EvidenceBucket }

  # ═══════════════════════════════════════
  # DYNAMODB TABLES
  # ═══════════════════════════════════════
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: phoneNumber, AttributeType: S }
        - { AttributeName: userId, AttributeType: S }
      KeySchema:
        - { AttributeName: phoneNumber, KeyType: HASH }
        - { AttributeName: userId, KeyType: RANGE }
      SSESpecification: { SSEEnabled: true }

  ClaimsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-claims
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: claimId, AttributeType: S }
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: lastUpdated, AttributeType: S }
      KeySchema:
        - { AttributeName: claimId, KeyType: HASH }
        - { AttributeName: userId, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: statusIndex
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: lastUpdated, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      SSESpecification: { SSEEnabled: true }

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: phoneNumber, AttributeType: S }
        - { AttributeName: sessionId, AttributeType: S }
      KeySchema:
        - { AttributeName: phoneNumber, KeyType: HASH }
        - { AttributeName: sessionId, KeyType: RANGE }
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }
      SSESpecification: { SSEEnabled: true }

  DeadlinesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-deadlines
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: claimId, AttributeType: S }
        - { AttributeName: deadline, AttributeType: S }
      KeySchema:
        - { AttributeName: claimId, KeyType: HASH }
        - { AttributeName: deadline, KeyType: RANGE }
      SSESpecification: { SSEEnabled: true }

  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-audit-log
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: claimId, AttributeType: S }
        - { AttributeName: timestamp, AttributeType: S }
      KeySchema:
        - { AttributeName: claimId, KeyType: HASH }
        - { AttributeName: timestamp, KeyType: RANGE }
      SSESpecification: { SSEEnabled: true }

  ConsentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bimasathi-consent
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: farmerId, AttributeType: S }
        - { AttributeName: helperId, AttributeType: S }
      KeySchema:
        - { AttributeName: farmerId, KeyType: HASH }
        - { AttributeName: helperId, KeyType: RANGE }
      SSESpecification: { SSEEnabled: true }

  # ═══════════════════════════════════════
  # S3 BUCKET
  # ═══════════════════════════════════════
  EvidenceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'bimasathi-evidence-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: GlacierAfterOneYear
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 365
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ═══════════════════════════════════════
  # COGNITO
  # ═══════════════════════════════════════
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: bimasathi-users
      UsernameAttributes: [phone_number]
      MfaConfiguration: 'OFF'
      Schema:
        - { Name: phone_number, Required: true, Mutable: true }
        - { Name: role, AttributeDataType: String, Mutable: true }
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: bimasathi-dashboard
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 24
      IdTokenValidity: 24
      RefreshTokenValidity: 30

  # ═══════════════════════════════════════
  # STEP FUNCTIONS
  # ═══════════════════════════════════════
  ClaimSubmissionWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: ClaimSubmissionWorkflow
      DefinitionUri: statemachine/claim-submission.asl.json
      DefinitionSubstitutions:
        ValidateInputFunctionArn: !GetAtt WhatsAppWebhookFunction.Arn
        ValidateEvidenceFunctionArn: !GetAtt PhotoProcessorFunction.Arn
        ClaimGeneratorFunctionArn: !GetAtt ClaimGeneratorFunction.Arn
        SubmitToInsurerFunctionArn: !GetAtt OperatorApiFunction.Arn
        CheckAcknowledgementFunctionArn: !GetAtt StatusPollerFunction.Arn
        UpdateStatusFunctionArn: !GetAtt StatusPollerFunction.Arn
        NotifyFarmerFunctionArn: !GetAtt ConversationEngineFunction.Arn
        AddToOperatorQueueFunctionArn: !GetAtt OperatorApiFunction.Arn
      Policies:
        - LambdaInvokePolicy: { FunctionName: !Ref WhatsAppWebhookFunction }
        - LambdaInvokePolicy: { FunctionName: !Ref PhotoProcessorFunction }
        - LambdaInvokePolicy: { FunctionName: !Ref ClaimGeneratorFunction }
        - LambdaInvokePolicy: { FunctionName: !Ref OperatorApiFunction }
        - LambdaInvokePolicy: { FunctionName: !Ref StatusPollerFunction }
        - LambdaInvokePolicy: { FunctionName: !Ref ConversationEngineFunction }

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
  WhatsAppWebhookUrl:
    Description: Meta WhatsApp webhook URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook/whatsapp'
  EvidenceBucketName:
    Description: S3 bucket for evidence storage
    Value: !Ref EvidenceBucket
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
